---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.1.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
  - repo: local
    hooks:
      - id: check-vault-encrypted
        name: Check host_vars are vault-encrypted
        entry: bin/check-vault-encrypted.sh
        language: script
        files: ^host_vars/
        exclude: ^host_vars/_example\.yml$
  - repo: https://github.com/ansible-community/ansible-lint.git
    rev: v26.2.0 # put latest release tag from https://github.com/ansible-community/ansible-lint/releases/
    hooks:
      - id: ansible-lint
        entry: python3 -m ansiblelint -v --force-color --fix
        files: \.(yaml|yml)$
