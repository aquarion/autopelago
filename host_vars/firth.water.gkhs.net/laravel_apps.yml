---
laravel_apps_matomo_url: "https://stat.istic.net"

firth_laravel_app_apps:
  # - name: example
  #   image: ghcr.io/istic/example
  #   image_tag: latest
  #   backend: fpm or octane
  #   port: 9000 (fpm) or 8000 (octane) must be unique across apps
  #   server_name: example.com
  #   app_url: https://example.com
  #   app_key: base64:... - probably from a vault lookup
  #   app_name: Example
  #   ssl_snippet: example - corresponds to a snippet in firth_nginix/templates/snippets/ for SSL config
  #   github_repo: istic/example - used for auto-deployments from GitHub Actions
  #   github_deploy_token: "{{ laravel_apps_deploy_token_istic }}" - a GitHub token with repo access, stored in Ansible Vault
  #   ghcr_username: "{{ ghcr_username }}" - GitHub username for accessing GHCR, stored in Ansible Vault
  #   ghcr_token: "{{ ghcr_token }}" - GitHub token for accessing GHCR, stored in Ansible Vault
  #   mysql: # optional MySQL config, these will be created in mysql.
  #     db_name: example
  #     db_user: example
  #     db_password: "{{ vault_example_db_password }}"
  #   redis: # optional Redis config, these will be created in redis.
  #     username: example
  #     password: "{{ vault_example_redis_password }}"
  #   elasticsearch: # optional Elasticsearch config - creates a scoped role and user.
  #     username: example
  #     password: "{{ vault_example_es_password }}"
  #     index_pattern: "example-*" # optional, defaults to "<name>-*"
  #   mail:
  #     host: smtp.example.com
  #     port: 587
  #     username: "{{ vault_example_mail_username }}"
  #     password: "{{ vault_example_mail_password }}"
  #     from_address: "support@istic.net"
  #     from_name: "Example Support"
  #  additional_env: # optional additional environment variables to pass to the container, can be used for things like third-party API keys
  #    EXAMPLE_API_KEY: "{{ vault_example_api_key }}"
  #  additional_volumes: # optional extra bind mounts/named volumes for the container
  #    - src: /home/docker/example/storage/app # bind mount from the host
  #      dest: /var/www/html/storage/app
  #      manage_owner: false # optional, defaults to true - set false for pre-existing/shared paths (e.g. a media library) so the role doesn't overwrite their ownership/mode every deploy
  #  scheduler: true # optional - runs `php artisan schedule:work` in its own container for apps using Laravel's task scheduler
  #  worker: true # optional - runs a queue worker in its own container
  #  worker_command: horizon # optional - defaults to "queue:work"
  #  staging: # optional staging config, if you want a separate staging environment with a different image tag and environment variables
  #      ## This is a duplicate of the config above, but with overrides for staging.
  #      ## The staging image should be built and pushed to GHCR by your CI pipeline when you push to your staging branch.
  - name: alchemistic
    image: ghcr.io/istic/alchemistic
    image_tag: latest
    backend: fpm
    port: 9000
    server_name: manage.istic.systems
    app_url: https://manage.istic.systems
    app_key: "{{ firth_alchemistic_app_key }}"
    app_name: Alchemistic
    ssl_snippet: istic
    github_repo: istic/alchemistic
    github_deploy_token: "{{ laravel_apps_deploy_token_istic }}"
    ghcr_username: "{{ ghcr_username }}"
    ghcr_token: "{{ ghcr_token }}"
    mysql:
      db_name: "{{ firth_alchemistic_db_name }}"
      db_user: "{{ firth_alchemistic_db_user }}"
      db_password: "{{ firth_alchemistic_db_password }}"
    mail:
      host: "{{ laravel_apps_mail_host }}"
      port: "{{ laravel_apps_mail_port }}"
      username: "{{ laravel_apps_mail_username }}"
      password: "{{ laravel_apps_mail_password }}"
      from_address: "{{ laravel_apps_mail_from_address }}"
      from_name: "Istic Support"

  - name: novelathon
    image: ghcr.io/istic/novelathon
    image_tag: latest
    backend: fpm
    port: 9001
    server_name: novelathon.com
    app_url: https://novelathon.com
    app_key: "{{ firth_novelathon_app_key }}"
    app_name: Novelathon
    ssl_snippet: novelathon.com
    www_redirect: true
    github_repo: istic/novelathon
    github_deploy_token: "{{ laravel_apps_deploy_token_istic }}"
    ghcr_username: "{{ ghcr_username }}"
    ghcr_token: "{{ ghcr_token }}"
    worker: true
    mysql:
      db_name: "{{ firth_novelathon_db_name }}"
      db_user: "{{ firth_novelathon_db_user }}"
      db_password: "{{ firth_novelathon_db_password }}"
    redis:
      username: "{{ firth_novelathon_redis_username }}"
      password: "{{ firth_novelathon_redis_password }}"
    mail:
      host: "{{ laravel_apps_mail_host }}"
      port: "{{ laravel_apps_mail_port }}"
      username: "{{ laravel_apps_mail_username }}"
      password: "{{ laravel_apps_mail_password }}"
      from_address: "{{ laravel_apps_mail_from_address }}"
      from_name: "Novelathon Support"
    additional_volumes:
      - src: /home/docker/novelathon/storage/app
        dest: /var/www/html/storage/app
    staging:
      image_tag: staging
      port: 9002
      server_name: novelathon.istic.dev
      app_url: https://novelathon.istic.dev
      app_key: "{{ firth_novelathon_staging_app_key }}"
      ssl_snippet: istic_dev
      mysql:
        db_name: "{{ firth_novelathon_staging_db_name }}"
        db_user: "{{ firth_novelathon_staging_db_user }}"
        db_password: "{{ firth_novelathon_staging_db_password }}"
      redis:
        username: "{{ firth_novelathon_staging_redis_username }}"
        password: "{{ firth_novelathon_staging_redis_password }}"
      additional_volumes:
        - src: /home/docker/novelathon-staging/storage/app
          dest: /var/www/html/storage/app

  - name: bloom
    image: ghcr.io/aquarion/bloom
    image_tag: latest
    backend: octane
    port: 8000
    server_name: bloomfeed.app
    app_url: https://bloomfeed.app
    app_key: "{{ vault_bloom_app_key }}"
    app_name: Bloom
    ssl_snippet: bloomfeedapp
    github_repo: aquarion/bloom
    github_deploy_token: "{{ laravel_apps_deploy_token_aquarion }}"
    ghcr_username: "{{ ghcr_username }}"
    ghcr_token: "{{ ghcr_token }}"
    scheduler: true
    mysql:
      db_name: bloom
      db_user: bloom
      db_password: "{{ vault_bloom_db_password }}"
    redis:
      username: bloom
      password: "{{ vault_bloom_redis_password }}"
    mail:
      host: "{{ laravel_apps_mail_host }}"
      port: "{{ laravel_apps_mail_port }}"
      username: "{{ laravel_apps_mail_username }}"
      password: "{{ laravel_apps_mail_password }}"
      from_address: "{{ laravel_apps_mail_from_address }}"
      from_name: "Bloom Support"
    staging:
      image_tag: staging
      port: 8001
      server_name: social.istic.dev
      app_url: https://social.istic.dev
      app_key: "{{ vault_bloom_staging_app_key }}"
      ssl_snippet: istic_dev
      mysql:
        db_name: bloom_staging
        db_user: bloom_staging
        db_password: "{{ vault_bloom_staging_db_password }}"
      redis:
        username: bloom_staging
        password: "{{ vault_bloom_staging_redis_password }}"

  - name: docket
    image: ghcr.io/aquarion/docket
    image_tag: latest
    backend: fpm
    port: 9003
    server_name: docket.hubris.house
    app_url: https://docket.hubris.house
    app_key: "{{ vault_docket_app_key }}"
    app_name: Docket
    ssl_snippet: hubris
    github_repo: aquarion/docket
    github_deploy_token: "{{ laravel_apps_deploy_token_aquarion }}"
    ghcr_username: "{{ ghcr_username }}"
    ghcr_token: "{{ ghcr_token }}"
    mysql:
      db_name: docket
      db_user: docket
      db_password: "{{ vault_docket_db_password }}"
    redis:
      username: docket
      password: "{{ vault_docket_redis_password }}"
    additional_env:
      MY_LAT: "{{ vault_docket_my_lat }}"
      MY_LON: "{{ vault_docket_my_lon }}"
      MAPBOX_API_TOKEN: "{{ vault_docket_mapbox_token }}"
      GOOGLE_CREDENTIALS_PATH: google/credentials.json
      GOOGLE_REDIRECT_URI: https://docket.hubris.house/token
      # Google OAuth for user login (Socialite)
      GOOGLE_CLIENT_ID: "{{ vault_docket_google_client_id }}"
      GOOGLE_CLIENT_SECRET: "{{ vault_docket_google_secret }}"
      CALENDAR_CACHE_TTL: "900"
    additional_files:
      - src: files/laravel/docket/google_credentials.vault.json
        dest: google/credentials.json
    staging:
      image_tag: staging
      port: 9004
      server_name: docket.istic.dev
      app_url: https://docket.istic.dev
      app_key: "{{ vault_docket_staging_app_key }}"
      ssl_snippet: istic_dev
      mysql:
        db_name: docket_staging
        db_user: docket_staging
        db_password: "{{ vault_docket_staging_db_password }}"
      redis:
        username: docket_staging
        password: "{{ vault_docket_staging_redis_password }}"
      additional_env:
        GOOGLE_REDIRECT_URI: https://docket.istic.dev/token
        MY_LAT: "{{ vault_docket_my_lat }}"
        MY_LON: "{{ vault_docket_my_lon }}"
        MAPBOX_API_TOKEN: "{{ vault_docket_mapbox_token }}"
        # Google OAuth for user login (Socialite)
        GOOGLE_CLIENT_ID: "{{ vault_docket_google_client_id }}"
        GOOGLE_CLIENT_SECRET: "{{ vault_docket_google_secret }}"
        GOOGLE_CREDENTIALS_PATH: google/credentials.json
        CALENDAR_CACHE_TTL: "900"
      additional_files:
        - src: files/laravel/docket/google_credentials.vault.json
          dest: google/credentials.json

  - name: wereabouts
    image: ghcr.io/istic/wereabouts
    image_tag: latest
    backend: fpm
    port: 9005
    server_name: locations.larp.me
    app_url: https://locations.larp.me
    app_key: "{{ vault_wereabouts_app_key }}"
    app_name: Wereabouts
    ssl_snippet: larpme
    github_repo: istic/wereabouts
    github_deploy_token: "{{ laravel_apps_deploy_token_istic }}"
    ghcr_username: "{{ ghcr_username }}"
    ghcr_token: "{{ ghcr_token }}"
    redis:
      username: wereabouts
      password: "{{ vault_wereabouts_redis_password }}"
    mail:
      host: "{{ laravel_apps_mail_host }}"
      port: "{{ laravel_apps_mail_port }}"
      username: "{{ laravel_apps_mail_username }}"
      password: "{{ laravel_apps_mail_password }}"
      from_address: "{{ laravel_apps_mail_from_address }}"
      from_name: "Wereabouts Support"
    additional_env:
      APP_VENUE_SHEET_ID: "1p2CS7rxPWyMs7g4OHH287j6iIPGkZb3VA7VRLBr0okA"
      GOOGLE_CREDENTIALS_PATH: google/credentials.json
      DB_DATABASE: /var/www/html/storage/database/production.sqlite
    additional_files:
      - src: files/laravel/wereabouts/google_credentials.vault.json
        dest: google/credentials.json
    additional_volumes:
      - src: /home/docker/wereabouts/storage/database
        dest: /var/www/html/storage/database
    staging:
      image_tag: staging
      port: 9006
      server_name: wereabouts.istic.dev
      app_url: https://wereabouts.istic.dev
      app_key: "{{ vault_wereabouts_staging_app_key }}"
      ssl_snippet: istic_dev
      redis:
        username: wereabouts_staging
        password: "{{ vault_wereabouts_staging_redis_password }}"
      additional_env:
        APP_VENUE_SHEET_ID: "1p2CS7rxPWyMs7g4OHH287j6iIPGkZb3VA7VRLBr0okA"
        GOOGLE_CREDENTIALS_PATH: google/credentials.json
        DB_DATABASE: /var/www/html/storage/database/staging.sqlite
      additional_files:
        - src: files/laravel/wereabouts/google_credentials.vault.json
          dest: google/credentials.json
      additional_volumes:
        - src: /home/docker/wereabouts-staging/storage/database
          dest: /var/www/html/storage/database

  # Vault variables required (add to vault manually):
  #   vault_thalium_app_key
  #   vault_thalium_staging_app_key
  #   vault_thalium_redis_password
  #   vault_thalium_staging_redis_password
  #   vault_thalium_es_user
  #   vault_thalium_es_pass
  - name: thalium
    image: ghcr.io/aquarion/thalium
    image_tag: latest
    backend: octane
    port: 8002
    server_name: thalium.aquarionics.com
    app_url: https://thalium.aquarionics.com
    app_key: "{{ vault_thalium_app_key }}"
    app_name: Thalium
    ssl_snippet: aquarionics
    nginx_snippet: thalium
    github_repo: aquarion/thalium
    github_deploy_token: "{{ laravel_apps_deploy_token_aquarion }}"
    ghcr_username: "{{ ghcr_username }}"
    ghcr_token: "{{ ghcr_token }}"
    worker: true
    worker_command: horizon
    redis:
      username: thalium
      password: "{{ vault_thalium_redis_password }}"
    elasticsearch:
      host: "{{ firth_elasticsearch_host }}"
      username: "{{ vault_thalium_es_user }}"
      password: "{{ vault_thalium_es_pass }}"
      index_pattern: "libris"
    additional_env:
      DOCKER_PDF_LIBRARY: /mnt/rpg
      LIBRARY_URL: https://thalium.aquarionics.com/_libris/
      DB_DATABASE: /var/www/html/storage/database/production.sqlite
    additional_volumes:
      - src: /home/library/RPG/Systems
        dest: /mnt/rpg
        manage_owner: false # shared media library, not thalium-owned - don't clobber its existing ownership/mode
      - name: elasticsearch_certs
        dest: /usr/share/elasticsearch/config/certs
        external: true
      - src: /home/docker/thalium/storage/database
        dest: /var/www/html/storage/database
    staging:
      image_tag: staging
      port: 8003
      server_name: thalium.istic.dev
      app_url: https://thalium.istic.dev
      app_key: "{{ vault_thalium_staging_app_key }}"
      ssl_snippet: istic_dev
      redis:
        username: thalium_staging
        password: "{{ vault_thalium_staging_redis_password }}"
      additional_env:
        DOCKER_PDF_LIBRARY: /mnt/rpg
        LIBRARY_URL: https://thalium.istic.dev/_libris/
        DB_DATABASE: /var/www/html/storage/database/staging.sqlite
      additional_volumes:
        - src: /home/library/RPG/Systems
          dest: /mnt/rpg
          manage_owner: false # shared media library, not thalium-owned - don't clobber its existing ownership/mode
        - name: elasticsearch_certs
          dest: /usr/share/elasticsearch/config/certs
          external: true
        - src: /home/docker/thalium-staging/storage/database
          dest: /var/www/html/storage/database
