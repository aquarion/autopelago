---
firth_laravel_app_remove_apps_example:
  - name: sprouter
    mysql:
      db_name: sprouter
      db_user: sprouter
    redis:
      username: sprouter
    server_name: social.istic.net
    # Bloom has moved to bloomfeed.app; social.istic.net is now a redirect
    remove:
      containers: true
      mysql: true
      redis: true
      nginx: false # Keep nginx config to avoid downtime if social.istic.net is repurposed.
      workdir: true
      system_user: true
    staging:
      mysql:
        db_name: sprouter_staging
        db_user: sprouter_staging
      redis:
        username: sprouter_staging
      server_name: social.istic.dev
      # Explicit flags matching production — staging sprouter fully deprovisioned.
      # To skip staging removal, use remove: {} (all flags absent = no steps run).
      # Omit this key entirely to inherit parent remove flags via default(flr.remove).
      remove:
        containers: true
        mysql: true
        redis: true
        nginx: false # Keep nginx config to avoid downtime if social.istic.net is repurposed.
        workdir: true
        system_user: true
