---
# List of apps to deploy — define in host_vars/firth.water.gkhs.net/laravel_apps.yml
firth_laravel_app_apps: []
# MySQL login credentials for provisioning databases (set in host vault)
firth_laravel_app_mysql_login_host: 127.0.0.1
firth_laravel_app_mysql_login_user: root

# Elasticsearch connection settings for provisioning users and roles
firth_laravel_app_elasticsearch_host: localhost
firth_laravel_app_elasticsearch_port: 9200
firth_laravel_app_elasticsearch_password: "{{ firth_elasticsearch_elastic_password }}"
firth_laravel_app_elasticsearch_ca_cert: /var/lib/docker/volumes/elasticsearch_certs/_data/ca/ca.crt
