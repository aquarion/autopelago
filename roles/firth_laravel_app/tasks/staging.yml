---
- name: Create staging working directory for {{ fla.name }}
  ansible.builtin.file:
    path: "{{ docker_root }}/{{ fla.name }}-staging"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: firth_laravel_app

- name: Create staging public asset directory for {{ fla.name }}
  ansible.builtin.file:
    path: "{{ docker_root }}/{{ fla.name }}-staging/public"
    state: directory
    owner: "{{ fla.name }}"
    group: "{{ fla.name }}"
    mode: "0755"
  tags: firth_laravel_app

- name: Set staging context for {{ fla.name }} # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    fla_ctx:
      name: "{{ fla.name }}-staging"
      image: "{{ fla.image }}"
      image_tag: "{{ fla.staging.image_tag | default('staging') }}"
      backend: "{{ fla.backend }}"
      port: "{{ fla.staging.port }}"
      app_name: "{{ fla.app_name | default(fla.name | capitalize) }} Staging"
      app_env: staging
      app_debug: "true"
      app_key: "{{ fla.staging.app_key }}"
      app_url: "{{ fla.staging.app_url }}"
      server_name: "{{ fla.staging.server_name }}"
      ssl_snippet: "{{ fla.staging.ssl_snippet | default(fla.ssl_snippet) }}"
      www_redirect: "{{ fla.staging.www_redirect | default(false) }}"
      worker: "{{ fla.staging.worker | default(fla.worker | default(false)) }}"
      workdir: "{{ fla.staging.workdir | default(fla.workdir | default('/var/www/html')) }}"
      mysql: "{{ fla.staging.mysql | default({}) }}"
      redis: "{{ fla.staging.redis | default({}) }}"
      mail: "{{ fla.mail | default({}) }}"
      system_user: "{{ fla.name }}"
  tags: firth_laravel_app

- name: Provision staging database for {{ fla.name }}
  ansible.builtin.include_tasks: mysql.yml
  when: fla_ctx.mysql | length > 0
  tags: firth_laravel_app

- name: Configure staging Redis user for {{ fla.name }}
  ansible.builtin.include_tasks: redis.yml
  when: fla_ctx.redis | length > 0
  tags: firth_laravel_app

- name: Deploy staging application for {{ fla.name }}
  ansible.builtin.include_tasks: deploy.yml
  tags: firth_laravel_app

- name: Deploy staging nginx vhost for {{ fla.name }}
  ansible.builtin.include_tasks: nginx.yml
  tags: firth_laravel_app
