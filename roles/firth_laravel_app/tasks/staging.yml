---
- name: Reset staging files changed state
  ansible.builtin.set_fact:
    firth_laravel_app_files_changed: false
  tags: [always, firth_laravel_app, firth_laravel_app_install]

- name: Create staging working directory for {{ fla.name }}
  ansible.builtin.file:
    path: "{{ docker_root }}/{{ fla.name }}-staging"
    state: directory
    owner: "{{ fla.name }}"
    group: docker
    mode: "0755"
  tags: [firth_laravel_app, firth_laravel_app_install]

- name: Link staging working directory to system user home for {{ fla.name }}
  ansible.builtin.file:
    src: "{{ docker_root }}/{{ fla.name }}-staging"
    dest: "/var/lib/{{ fla.name }}/staging"
    state: link
  tags: [firth_laravel_app, firth_laravel_app_install]

- name: Create staging public asset directory for {{ fla.name }}
  ansible.builtin.file:
    path: "{{ docker_root }}/{{ fla.name }}-staging/public"
    state: directory
    owner: "{{ fla.name }}"
    group: "{{ fla.name }}"
    mode: "0755"
  tags: [firth_laravel_app, firth_laravel_app_install]

- name: Set staging context for {{ fla.name }} # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    fla_ctx:
      name: "{{ fla.name }}-staging"
      image: "{{ fla.image }}"
      image_tag: "{{ fla.staging.image_tag | default('staging') }}"
      backend: "{{ fla.backend }}"
      port: "{{ fla.staging.port }}"
      app_name: "{{ fla.app_name | default(fla.name | capitalize) }} Staging"
      app_env: staging
      app_debug: "true"
      app_key: "{{ fla.staging.app_key }}"
      app_url: "{{ fla.staging.app_url }}"
      server_name: "{{ fla.staging.server_name }}"
      ssl_snippet: "{{ fla.staging.ssl_snippet | default(fla.ssl_snippet) }}"
      www_redirect: "{{ fla.staging.www_redirect | default(false) }}"
      healthcheck_path: "{{ fla.staging.healthcheck_path | default(fla.healthcheck_path | default('', true), true) }}"
      worker: "{{ fla.staging.worker | default(fla.worker | default(false)) }}"
      worker_command: "{{ fla.staging.worker_command | default(fla.worker_command | default('queue:work')) }}"
      scheduler: "{{ fla.staging.scheduler | default(fla.scheduler | default(false)) }}"
      workdir: "{{ fla.staging.workdir | default(fla.workdir | default('/var/www/html')) }}"
      mysql: "{{ fla.staging.mysql | default({}) }}"
      redis: "{{ fla.staging.redis | default({}) }}"
      elasticsearch: "{{ fla.staging.elasticsearch | default(fla.elasticsearch | default({})) }}"
      mail: "{{ fla.mail | default({}) }}"
      additional_env: "{{ fla.staging.additional_env | default(fla.additional_env | default({})) }}"
      additional_files: "{{ fla.staging.additional_files | default(fla.additional_files | default([])) }}"
      additional_volumes: "{{ fla.staging.additional_volumes | default(fla.additional_volumes | default([])) }}"
      nginx_snippet: "{{ fla.staging.nginx_snippet | default(fla.nginx_snippet | default('')) }}"
      system_user: "{{ fla.name }}"
      container_uid: "{{ fla.container_uid | default('82') }}"
  tags: [firth_laravel_app, firth_laravel_app_install]

- name: Provision staging database for {{ fla.name }}
  ansible.builtin.include_tasks: mysql.yml
  when: fla_ctx.mysql | length > 0
  tags: [firth_laravel_app, firth_laravel_app_install]

- name: Configure staging Redis user for {{ fla.name }}
  ansible.builtin.include_tasks: redis.yml
  when: fla_ctx.redis | length > 0
  tags: [firth_laravel_app, firth_laravel_app_install]

- name: Provision staging Elasticsearch for {{ fla.name }}
  ansible.builtin.include_tasks: elasticsearch.yml
  when: fla_ctx.elasticsearch | length > 0
  tags: [firth_laravel_app, firth_laravel_app_install]

- name: Deploy staging additional files for {{ fla.name }}
  ansible.builtin.include_tasks: files.yml
  when: fla_ctx.additional_files | length > 0
  tags: [firth_laravel_app, firth_laravel_app_install]

- name: Deploy staging application for {{ fla.name }}
  ansible.builtin.include_tasks: deploy.yml
  tags: [firth_laravel_app, firth_laravel_app_install]

- name: Deploy staging nginx vhost for {{ fla.name }}
  ansible.builtin.include_tasks: nginx.yml
  tags: [firth_laravel_app, firth_laravel_app_install]
