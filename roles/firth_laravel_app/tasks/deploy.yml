---
# Deploy the Laravel app using docker-compose
# use --skip-tags=laravel_apps_deploy to skip this step (e.g. when only doing
# config changes that don't require redeploy, or the image doesn't exist yet)

- name: Deploy {{ fla_ctx.name }}
  tags: [firth_laravel_app, firth_laravel_app_install]
  block:
    - name: Validate additional_volumes entries for {{ fla_ctx.name }}
      ansible.builtin.assert:
        that:
          - (vol.src is defined) or (vol.name is defined)
          - vol.dest is defined
        fail_msg: >
          additional_volumes entry in {{ fla_ctx.name }} is missing 'dest'
          or has neither 'src' (bind mount) nor 'name' (named volume). Entry: {{ vol }}
      loop: "{{ fla_ctx.additional_volumes }}"
      loop_control:
        loop_var: vol
      when: fla_ctx.additional_volumes | length > 0

    - name: Ensure host bind-mount directories exist for {{ fla_ctx.name }}
      ansible.builtin.file:
        path: "{{ vol.src }}"
        state: directory
        owner: "{{ (fla_ctx.container_uid | default('82')) if (vol.manage_owner | default(true)) else omit }}"
        group: "{{ fla_ctx.system_user if (vol.manage_owner | default(true)) else omit }}"
        mode: "{{ '0750' if (vol.manage_owner | default(true)) else omit }}"
      loop: "{{ fla_ctx.additional_volumes | selectattr('src', 'defined') | list }}"
      loop_control:
        loop_var: vol
      when: fla_ctx.additional_volumes | selectattr('src', 'defined') | list | length > 0
      register: firth_laravel_app_bind_mount_dirs

    - name: Force container recreation if bind-mount directories were created for {{ fla_ctx.name }}
      ansible.builtin.set_fact:
        firth_laravel_app_files_changed: true
      when: firth_laravel_app_bind_mount_dirs.changed | default(false)

    - name: Template docker-compose.yml for {{ fla_ctx.name }}
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ docker_root }}/{{ fla_ctx.name }}/docker-compose.yml"
        owner: root
        group: docker
        mode: "0660"
        validate: docker compose -f %s config -q

    - name: Pull and start {{ fla_ctx.name }}
      community.docker.docker_compose_v2:
        project_src: "{{ docker_root }}/{{ fla_ctx.name }}"
        pull: always
        state: present
        recreate: "{{ 'always' if (firth_laravel_app_files_changed | default(false)) else 'auto' }}"
      become: true
      become_user: "{{ fla_ctx.system_user }}"
      register: firth_laravel_app_compose
      tags:
        - laravel_apps_deploy

    - name: Remove stale build assets for {{ fla_ctx.name }}
      ansible.builtin.file:
        path: "{{ docker_root }}/{{ fla_ctx.name }}/public/build"
        state: absent
      when: firth_laravel_app_compose.changed
      tags:
        - laravel_apps_deploy

    - name: Wait for container to be running for {{ fla_ctx.name }}
      ansible.builtin.command: docker compose exec -T app true
      args:
        chdir: "{{ docker_root }}/{{ fla_ctx.name }}"
      become: true
      become_user: "{{ fla_ctx.system_user }}"
      register: firth_laravel_app_container_wait
      until: firth_laravel_app_container_wait.rc == 0
      retries: 10
      delay: 3
      when: firth_laravel_app_compose.changed
      changed_when: false
      tags:
        - laravel_apps_deploy

    - name: Copy Vite build assets from container for {{ fla_ctx.name }}
      ansible.builtin.command: docker compose cp app:{{ fla_ctx.workdir }}/public/build public/build
      args:
        chdir: "{{ docker_root }}/{{ fla_ctx.name }}"
      become: true
      become_user: "{{ fla_ctx.system_user }}"
      when: firth_laravel_app_compose.changed
      changed_when: firth_laravel_app_compose.changed
      tags:
        - laravel_apps_deploy

    - name: Run migrations for {{ fla_ctx.name }}
      ansible.builtin.command: docker compose exec -T app php artisan migrate --force
      args:
        chdir: "{{ docker_root }}/{{ fla_ctx.name }}"
      become: true
      become_user: "{{ fla_ctx.system_user }}"
      when: firth_laravel_app_compose.changed and fla_ctx.mysql | length > 0
      register: firth_laravel_app_migrate
      changed_when: "'migrated' in firth_laravel_app_migrate.stdout"
      tags:
        - laravel_apps_deploy

  rescue:
    - name: Debug deploy failure for {{ fla_ctx.name }}
      ansible.builtin.debug:
        msg: "Failed to deploy {{ fla_ctx.name }}. Check docker-compose.yml and image availability."

    - name: Abort after deploy failure for {{ fla_ctx.name }}
      ansible.builtin.fail:
        msg: "Cannot continue: deploy of {{ fla_ctx.name }} failed."
