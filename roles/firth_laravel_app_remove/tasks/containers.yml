---
- name: Stop containers for {{ flr_ctx.name }}
  tags: [firth_laravel_app, firth_laravel_app_remove]
  block:
    - name: Check if working directory exists for {{ flr_ctx.name }}
      ansible.builtin.stat:
        path: "{{ docker_root }}/{{ flr_ctx.name }}"
      register: firth_laravel_app_remove_workdir_stat

    - name: Check if system user exists for {{ flr_ctx.name }}
      ansible.builtin.command:
        cmd: id {{ flr_ctx.system_user }}
      register: firth_laravel_app_remove_user_check
      changed_when: false
      failed_when: false

    - name: Run docker compose down --volumes for {{ flr_ctx.name }}
      ansible.builtin.command:
        cmd: docker compose down --volumes
        chdir: "{{ docker_root }}/{{ flr_ctx.name }}"
      become: true
      become_user: "{{ flr_ctx.system_user }}"
      when:
        - firth_laravel_app_remove_workdir_stat.stat.exists
        - firth_laravel_app_remove_user_check.rc == 0
      changed_when: true

  rescue:
    - name: Debug containers failure for {{ flr_ctx.name }}
      ansible.builtin.debug:
        msg: >
          Failed task: {{ ansible_failed_task.name }}.
          Error: {{ ansible_failed_result.msg | default(ansible_failed_result.stderr) | default('unknown') }}.
          Failed to stop containers for {{ flr_ctx.name }}.

    - name: Abort after containers failure for {{ flr_ctx.name }}
      ansible.builtin.fail:
        msg: "Cannot continue: container teardown for {{ flr_ctx.name }} failed."
