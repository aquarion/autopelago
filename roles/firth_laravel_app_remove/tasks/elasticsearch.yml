---
- name: "Remove Elasticsearch user and role for {{ flr_ctx.name }}"
  tags: [firth_laravel_app, firth_laravel_app_remove]
  block:
    - name: "Remove Elasticsearch user: {{ flr_ctx.elasticsearch.username }}"
      ansible.builtin.uri:
        url: "https://{{ firth_laravel_app_remove_elasticsearch_host }}:{{ firth_laravel_app_remove_elasticsearch_port }}/_security/user/{{ flr_ctx.elasticsearch.username
          }}"
        method: DELETE
        url_username: elastic
        url_password: "{{ firth_laravel_app_remove_elasticsearch_password }}"
        force_basic_auth: true
        ca_path: "{{ firth_laravel_app_remove_elasticsearch_ca_cert }}"
        status_code: [200, 404]

    - name: "Remove Elasticsearch role: {{ flr_ctx.name }}"
      ansible.builtin.uri:
        url: "https://{{ firth_laravel_app_remove_elasticsearch_host }}:{{ firth_laravel_app_remove_elasticsearch_port }}/_security/role/{{ flr_ctx.name }}"
        method: DELETE
        url_username: elastic
        url_password: "{{ firth_laravel_app_remove_elasticsearch_password }}"
        force_basic_auth: true
        ca_path: "{{ firth_laravel_app_remove_elasticsearch_ca_cert }}"
        status_code: [200, 404]

  rescue:
    - name: "Debug Elasticsearch removal failure for {{ flr_ctx.name }}"
      ansible.builtin.debug:
        msg: >
          Failed task: {{ ansible_failed_task.name }}.
          Error: {{ ansible_failed_result.msg | default(ansible_failed_result.stderr) | default('unknown') }}.
          Failed to remove Elasticsearch user/role for {{ flr_ctx.name }}.

    - name: "Abort after Elasticsearch removal failure for {{ flr_ctx.name }}"
      ansible.builtin.fail:
        msg: "Cannot continue: Elasticsearch removal for {{ flr_ctx.name }} failed."
