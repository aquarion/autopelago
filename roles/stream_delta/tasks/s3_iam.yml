---
# Infrastructure (always runs, idempotent)
- name: Create S3 bucket for game logo uploads
  amazon.aws.s3_bucket:
    name: "{{ stream_delta_aws_bucket }}"
    region: "{{ stream_delta_aws_region }}"
    aws_profile: istic
    state: present
    public_access:
      block_public_acls: false
      block_public_policy: false
      ignore_public_acls: false
      restrict_public_buckets: false
    policy:
      Version: "2012-10-17"
      Statement:
        - Sid: PublicReadGetObject
          Effect: Allow
          Principal: "*"
          Action: "s3:GetObject"
          Resource: "arn:aws:s3:::{{ stream_delta_aws_bucket }}/*"

- name: Create IAM user for stream-delta logo uploads
  amazon.aws.iam_user:
    name: "{{ stream_delta_aws_iam_user }}"
    state: present
    aws_profile: istic
  register: stream_delta_iam_user

- name: Create IAM policy for stream-delta logo bucket access
  amazon.aws.iam_managed_policy:
    policy_name: stream-delta-logos-policy
    state: present
    aws_profile: istic
    policy:
      Version: "2012-10-17"
      Statement:
        - Effect: Allow
          Action:
            - "s3:PutObject"
            - "s3:DeleteObject"
          Resource: "arn:aws:s3:::{{ stream_delta_aws_bucket }}/*"
  register: stream_delta_iam_policy

- name: Attach logo bucket policy to IAM user
  amazon.aws.iam_user:
    name: "{{ stream_delta_aws_iam_user }}"
    state: present
    aws_profile: istic
    managed_policies:
      - "{{ stream_delta_iam_policy.policy.arn }}"

# Access key management
- name: Check if credentials file already exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/host_vars/atoll.water.gkhs.net/stream_delta_aws.yml"
  delegate_to: localhost
  register: _stream_delta_aws_creds_file

- name: List existing IAM access keys for stream-delta logos user
  amazon.aws.iam_access_key_info:
    user_name: "{{ stream_delta_aws_iam_user }}"
    aws_profile: istic
  register: _stream_delta_existing_keys
  when: _stream_delta_aws_creds_file.stat.exists

- name: Delete credentials file if access key is no longer active in IAM
  ansible.builtin.file:
    path: "{{ playbook_dir }}/host_vars/atoll.water.gkhs.net/stream_delta_aws.yml"
    state: absent
  delegate_to: localhost
  when: >
    _stream_delta_aws_creds_file.stat.exists and
    (_stream_delta_existing_keys.access_keys | selectattr('status', 'equalto', 'Active') | list | length == 0)

- name: Create IAM access key for stream-delta logos user
  amazon.aws.iam_access_key:
    user_name: "{{ stream_delta_aws_iam_user }}"
    state: present
    aws_profile: istic
  register: stream_delta_iam_access_key
  no_log: true
  when: >
    not _stream_delta_aws_creds_file.stat.exists or
    (_stream_delta_existing_keys is defined and
    _stream_delta_existing_keys.access_keys | selectattr('status', 'equalto', 'Active') | list | length == 0)

# Credentials file writing (all tasks share the same when condition)
- name: Write vault-encrypted credentials file
  when: stream_delta_iam_access_key is defined and stream_delta_iam_access_key.changed
  block:
    - name: Inject new AWS credentials into play variables
      ansible.builtin.set_fact:
        stream_delta_aws_access_key_id: "{{ stream_delta_iam_access_key.access_key.access_key_id }}"
        stream_delta_aws_secret_access_key: "{{ stream_delta_iam_access_key.secret_access_key }}"
      no_log: true

    - name: Write and vault-encrypt credentials file
      delegate_to: localhost
      block:
        - name: Create temp file for plaintext credentials
          ansible.builtin.tempfile:
            suffix: .yml
          register: _stream_delta_creds_tmp

        - name: Write plaintext credentials to temp file
          ansible.builtin.copy:
            content: "{{ lookup('ansible.builtin.template', 'stream_delta_aws.yml.j2') }}"
            dest: "{{ _stream_delta_creds_tmp.path }}"
            mode: "0600"
          no_log: true

        - name: Encrypt credentials file with ansible-vault
          ansible.builtin.command:
            cmd: >
              {{ ansible_playbook_python | dirname }}/ansible-vault encrypt
              --vault-password-file {{ lookup('env', 'HOME') }}/.vault_pass.txt
              --output {{ playbook_dir }}/host_vars/atoll.water.gkhs.net/stream_delta_aws.yml
              {{ _stream_delta_creds_tmp.path }}
          changed_when: true

        - name: Set credentials file ownership
          ansible.builtin.file:
            path: "{{ playbook_dir }}/host_vars/atoll.water.gkhs.net/stream_delta_aws.yml"
            owner: "{{ lookup('env', 'USER') }}"
            group: "{{ lookup('env', 'USER') }}"
            mode: "0660"

      always:
        - name: Remove temp credentials file
          ansible.builtin.file:
            path: "{{ _stream_delta_creds_tmp.path }}"
            state: absent
          when: _stream_delta_creds_tmp is defined

    - name: Remind operator to commit credentials file
      ansible.builtin.debug:
        msg: >
          Vault-encrypted credentials written to
          host_vars/atoll.water.gkhs.net/stream_delta_aws.yml — commit this file.
