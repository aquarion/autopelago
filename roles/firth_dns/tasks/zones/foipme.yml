  rescue:
    - name: Acceptable failure warning
      ansible.builtin.debug:
        msg: |
          AWS Route53 of Foip.me tasks failed, which is fine, because we don't
          own this domain anymore. The tasks are just here to clean up the
          records. If they're cleaned up, the tasks will fail, which is
          expected. If you see this message, it means the tasks failed,
          but that's okay.

- name: Foip.me
  amazon.aws.route53_zone:
    state: absent
    zone: foip.me
    aws_profile: aqcom
  tags:
    - aws
    - foipme
