---
- name: Socksandpuppets Cloudflare Tasks
  tags:
    - cloudflare
    - cloudflare_dns
    - socksandpuppets
  block:
    - name: (CF) Socksandpuppets.com. - A
      community.general.cloudflare_dns:
        state: present
        zone: socksandpuppets.com
        proxied: true
        record: "@"
        api_token: "{{ cloudflare_api_key }}"
        type: A
        value: "{{ loadbalancer_ip }}"

    - name: (CF) Www.socksandpuppets.com. - A
      community.general.cloudflare_dns:
        state: present
        zone: socksandpuppets.com
        proxied: true
        record: www
        api_token: "{{ cloudflare_api_key }}"
        type: A
        value: "{{ loadbalancer_ip }}"

    - name: (CF) Comicpress.socksandpuppets.com. - A
      community.general.cloudflare_dns:
        state: present
        zone: socksandpuppets.com
        proxied: true
        record: comicpress
        api_token: "{{ cloudflare_api_key }}"
        type: A
        value: "{{ loadbalancer_ip }}"

    - name: (CF) Socksandpuppets.com. wildcard - A
      community.general.cloudflare_dns:
        state: present
        zone: socksandpuppets.com
        proxied: true
        record: "*"
        api_token: "{{ cloudflare_api_key }}"
        type: A
        value: "{{ loadbalancer_ip }}"

    - name: (CF) Socksandpuppets.com. wildcard cenote - A - remove
      community.general.cloudflare_dns:
        state: absent
        zone: socksandpuppets.com
        proxied: true
        record: "*"
        api_token: "{{ cloudflare_api_key }}"
        type: A
        value: "109.74.192.161"

    - name: (CF) _atproto.socksandpuppets.com. - TXT
      community.general.cloudflare_dns:
        state: present
        zone: socksandpuppets.com
        record: _atproto
        api_token: "{{ cloudflare_api_key }}"
        type: TXT
        value: '"did=did:plc:6gbricujupbk2veztj36cdit"'
