---
- name: Socksandpuppets Cloudflare Tasks
  tags:
    - cloudflare
    - cloudflare_dns
    - socksandpuppets
  block:
    - name: (CF) Socksandpuppets.com. - A
      community.general.cloudflare_dns:
        state: present
        zone: socksandpuppets.com
        proxied: true
        record: "@"
        api_token: "{{ cloudflare_api_key }}"
        type: A
        value: "{{ loadbalancer_ip }}"

    - name: (CF) Socksandpuppets.com. wildcard - A
      community.general.cloudflare_dns:
        state: present
        zone: socksandpuppets.com
        proxied: true
        record: "*"
        api_token: "{{ cloudflare_api_key }}"
        type: A
        value: "{{ loadbalancer_ip }}"
