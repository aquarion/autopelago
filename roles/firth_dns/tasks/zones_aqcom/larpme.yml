---
- name: Larpme DNS - larpme root
  amazon.aws.route53:
    overwrite: true
    state: present
    zone: larp.me
    record: larp.me
    type: A
    ttl: "300"
    value: "{{ loadbalancer_ip }}"
    aws_profile: aqcom

- name: Larpme DNS - larpme root TXT
  amazon.aws.route53:
    overwrite: true
    state: present
    zone: larp.me
    record: larp.me
    type: TXT
    ttl: "3600"
    value: '"v=spf1 a mx include:smtp1.uservoice.com include:_spf.google.com include:spf.mtasv.net ~all"'
    aws_profile: aqcom

