---
# defaults file for roles/firth_sftp_docker

firth_sftp_docker_user: sftp_docker
firth_sftp_docker_group: sftp_docker

firth_sftp_docker_db_host: localhost
firth_sftp_docker_db_port: 3306
firth_sftp_docker_db_user:
firth_sftp_docker_db_password:
firth_sftp_docker_db_name:
# Example structure for firth_sftp_docker_users
# firth_sftp_docker_users:
#   - name: user1
#     password: pass1
#     userid: 1001
#     groupid: 1001
#     bind_mounts:
#       - source: /data/user1/files
#         target: files
#         read_only: false
#       - source: /data/user1/docs
#         target: docs
#         read_only: true
#     # Optional: add a PHP-FPM sidecar container for this user's webroot.
#     php_web_domain: user1.example.com  # subdirectory under sftp/home/<user>/ to serve as webroot;
#                                        # creates a phpfpm_<user> container with a Unix socket at
#                                        # docker_root/sftp/run/<user>.sock
#     php_image: php:8.3-fpm-alpine      # optional override, defaults to php:8.3-fpm-alpine
