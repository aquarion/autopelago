---
- name: Install and setup Redis
  tags: redis
  block:
    - name: Install Redis
      ansible.builtin.apt:
        state: present
        pkg:
          - redis-server
          - redis-tools

    - name: Configure Redis default user password
      ansible.builtin.lineinfile:
        path: /etc/redis/users.acl
        line: user default on +@all -DEBUG ~* >{{ redis_password }}
        regex: ^user default
        create: true
        mode: "0600"
        owner: redis
        group: redis
      notify:
        - Reload Redis ACL

    - name: Configure Redis acl
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        line: aclfile /etc/redis/users.acl
        regex: ^aclfile
      notify:
        - Restart redis

    - name: Create redis-server systemd drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/system/redis-server.service.d
        state: directory
        mode: "0755"

    - name: Deploy redis-server restart override
      ansible.builtin.template:
        src: redis-server-override.conf.j2
        dest: /etc/systemd/system/redis-server.service.d/restart-on-failure.conf
        mode: "0644"
      notify:
        - Reload systemd
